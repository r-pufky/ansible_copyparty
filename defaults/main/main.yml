---
###############################################################################
# Feature Flags
###############################################################################

# 1. Run maintenance tasks?
#
# Preform role maintenance tasks including removal of old role versions. Does
# not affect running services.
#
# Default: True.
copyparty_flg_maintenance: true

# 2. Install application?
#
# Creates required default directories, users, install packages, download
# software, update services, and set minimal copyparty.conf if not specified.
# Services stopped.
#
# Default: True.
copyparty_flg_install: true

# 3. Set copyparty.conf?
#
# File set using copyparty_cfg_file. Stops service and deploys user
# configuration, updates services. Services stopped.
#
# Default: False.
copyparty_flg_config: false

# 4. Verify service running?
#
# Start services after role application and verify running or fail.
#
# Default: True.
copyparty_flg_start: true

###############################################################################
# Service
###############################################################################

# Copyparty release.
#
# Submit an issue if future versions break role deployment.
#
# Default: 'v1.20.10'.
#
# Reference:
# * https://github.com/9001/copyparty/releases
copyparty_srv_version: 'v1.20.10'

# Github access token.
#
# Unauthenticated (anonymous) API requests are heavily restricted to the sum
# total of requests to github from a given IP. Use an access token if
# receiving 403's.
#
# Classic Tokens:
# * settings > developer settings > personal access tokens (classic)
#   * notes: {LABEL APPROPRIATELY}
#   * expiration: {CUSTOM}
#   * scopes: NONE
#
# Fine-grained Tokens:
# * settings > developer settings > personal access tokens (fine-grained)
#   * token name: {LABEL APPROPRIATELY}
#   * expiration: {CUSTOM}
#   * description: {DESCRIPTIVE TEXT}
#   * resource owner: {YOUR ACCOUNT}
#   * repository access: Public Repositories (read-only)
#
# Default: '' (unauthenticated).
#
# Reference:
# * https://docs.github.com/en/authentication
copyparty_srv_token: ''

# Service environment variables.
#
# copyparty_srv_env:
#     list of dict - Environment variables to set.
#   - var: str - Environment variable name.
#     value: str - Environment variable value.
#
# Default:
#   - var: 'PYTHONUNBUFFERED'
#     value: 'x'
#   - var: 'XDG_CONFIG_HOME'
#     value: '/var/lib/copyparty/.config'
#
# Reference:
# * https://github.com/9001/copyparty?tab=readme-ov-file#feature-chickenbits
copyparty_srv_env:
  - var: 'PYTHONUNBUFFERED'
    value: 'x'
  - var: 'XDG_CONFIG_HOME'
    value: '/var/lib/copyparty/.config'

# User that copyparty will run under.
#
# 'copyparty' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'copyparty'.
copyparty_srv_user: 'copyparty'

# Group that copyparty will run under.
#
# 'copyparty' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'copyparty'.
copyparty_srv_group: 'copyparty'

###############################################################################
# Config
###############################################################################

# copyparty.conf to set.
#
# Ansible controller path to source copyparty.conf (treated as a jinja2
# template allowing for ansible variable interpretation). Overwrites existing
# /etc/opt/copyparty/copyparty.conf.
#
# A minimally configured template that works with the role will be deployed if
# no config file is specified (see templates/copyparty.conf.j2):
#   [global]
#     i: 0.0.0.0
#   [accounts]
#     user: user
#   [/]
#     /d
#     accs:
#       r: *
#       rwdma: user
#     flags:
#       grid
#
# Manage additional files and directories (custom data storage locations, etc.)
# outside of the role. Must be accessible to copyparty_srv_user account.
#
# copyparty_cfg_file: 'host_vars/cp.example.com/copyparty.conf'
#
# Default: '' (use minimally configured role template).
#
# Reference:
# * https://github.com/9001/copyparty/blob/hovudstraum/docs/example.conf
# * copyparty --help
copyparty_cfg_file: ''
