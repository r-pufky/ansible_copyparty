---
###############################################################################
# Configure Services
###############################################################################
# Create Debian standard locations for copyparty installation and use
# in case there are configurations with multiple files.
#
# Prefer TOML static configuration file but use YAML if it is the only version
# available for service.
#
# Reference:
# * https://betatim.github.io/posts/copyparty-config-bare-metal/

- name: 'Config | manage data directories'
  ansible.builtin.file:
    path: '{{ item }}'
    owner: '{{ _copyparty_srv_user._uid }}'
    group: '{{ _copyparty_srv_group._gid }}'
    mode: '0750'
    recurse: true
    state: 'directory'
  loop:
    - '/etc/copyparty'
    - '/var/lib/copyparty'
  become: true
  become_user: 'root'

- name: 'Config | set configuration'
  ansible.builtin.template:
    src: '{{ _copyparty_srv_config.raw }}'
    dest: '{{ _copyparty_srv_config._dest }}'
    owner: '{{ _copyparty_srv_user._uid }}'
    group: '{{ _copyparty_srv_group._gid }}'
    mode: '0640'

- name: 'Config | set service definitions'
  ansible.builtin.include_role:
    name: 'r_pufky.deb.systemd'
  vars:
    systemd_daemon_reload_enable: true
    systemd_services:
      - name: 'copyparty'
        state: 'present'
        drop_in: false
        unit:
          description: 'copyparty file server'
          after:
            - 'network.target'
        service:
          exec_start:
            - '{{
                "/usr/bin/python3 /opt/copyparty/copyparty -c " ~
                _copyparty_srv_config._dest
              }}'
          type: 'notify'
          restart: 'always'
          exec_reload: ['/bin/kill -s USR1 $MAINPID']
          # PermissionsStartOnly=true - Default systemd behavior now.
        exec:
          user: '{{ _copyparty_srv_user.raw }}'
          group: '{{ _copyparty_srv_group.raw }}'
          environment: '{{ _copyparty_srv_env.raw }}'
          syslog_identifier: 'copyparty'
          working_directory: '/var/lib/copyparty'
          ambient_capabilities_include:  # Rootless <1024 port binding.
            - 'CAP_NET_BIND_SERVICE'
          protect_clock: true
          protect_control_groups: true
          protect_hostname: true
          protect_kernel_logs: true
          protect_kernel_modules: true
          protect_kernel_tunables: true
          protect_proc: 'invisible'
          remove_ipc: true
          restrict_namespaces_allow: true  # Bad label - deny all namespaces.
          restrict_realtime: true
          restrict_suid_sgid: true
        resource_control:
          memory_max: '50%'
          memory_swap_max: '50%'
        install:
          wanted_by:
            - 'multi-user.target'
