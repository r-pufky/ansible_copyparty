---
###############################################################################
# Configure Services
###############################################################################

- name: '{{ "Config | filesystem | set " ~ copyparty__cfg._cfg }}'
  ansible.builtin.template:
    src: '{{ copyparty__cfg._file }}'
    dest: '{{ copyparty__cfg._cfg }}'
    owner: '{{ copyparty__cfg._uid }}'
    group: '{{ copyparty__cfg._gid }}'
    mode: '0640'
