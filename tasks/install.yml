---
###############################################################################
# Install Packages & Services
###############################################################################
# copyparty is a static python file. Manually download, and install packages
# according to Linux FHS standards:
#
# Type    | Perms               | Path
# --------|---------------------|-------
# Source  | 0755/0644 root:root | /opt/*
# Runtime | 0750/0640 SRV:SRV   | /var/opt/copyparty
# Config  | 0640 SRV:SRV        | /etc/opt/copyparty

- name: 'Install | filesystem | set system directories'
  ansible.builtin.file:
    path: '{{ copyparty___app._src_dir }}'  # src_dir includes opt_dir.
    owner: 'root'
    group: 'root'
    mode: '0755'
    state: 'directory'

- name: 'Install | filesystem | set copyparty directories'
  ansible.builtin.file:
    path: '{{ item }}'
    owner: '{{ copyparty__cfg._uid }}'
    group: '{{ copyparty__cfg._gid }}'
    mode: '0750'
    state: 'directory'
  loop:
    - '{{ copyparty___app._etc_dir }}'
    - '{{ copyparty___app._var_dir }}'

- name: 'Install | packages'
  ansible.builtin.include_role:
    name: 'r_pufky.deb.apt'
  vars:
    apt_packages:
      - '{{ copyparty___packages }}'
    apt_srv_package_update_cache: true

###############################################################################
# copyparty
###############################################################################

- name: 'Install | filesystem | find previous installations'
  ansible.builtin.find:
    paths: '{{ copyparty___app._src_dir }}'
    file_type: 'directory'
    recurse: false
    excludes:
      - '{{ copyparty__srv._version }}'
  register: copyparty__cmd

- name: 'Install | filesystem | remove previous installations'
  ansible.builtin.file:
    path: '{{ item.path }}'
    state: 'absent'
  loop: '{{ copyparty__cmd.files }}'

- name: '{{ "Install | url | 🗘 " ~ copyparty__cfg._package ~ " 🗘" }}'
  when: not (url_inject_enable | default(false))
  ansible.builtin.get_url:
    url: '{{ copyparty__cfg._url }}'
    dest: '{{ "/tmp/" ~ copyparty__cfg._package }}'
    force: false
    owner: 'root'
    group: 'root'
    mode: '0644'
    headers:
      Authorization: '{{ copyparty__srv._token | default(omit) }}'
  register: copyparty__cmd
  until: copyparty__cmd is succeeded

- name: '{{ "Install | filesystem | set " ~ copyparty__cfg._live_dir }}'
  ansible.builtin.file:
    path: '{{ copyparty__cfg._live_dir }}'
    owner: 'root'
    group: 'root'
    mode: '0755'
    state: 'directory'

- name: '{{ "Install | filesystem | stage " ~ copyparty__cfg._app }}'
  ansible.builtin.copy:
    remote_src: true
    src: '{{ "/tmp/" ~ copyparty__cfg._package }}'
    dest: '{{ copyparty__cfg._app }}'
    owner: 'root'
    group: 'root'
    mode: '0644'

- name: '{{ "Install | filesystem | set minimal " ~ copyparty___app._cfg }}'
  when: copyparty__cfg._file | length == 0
  ansible.builtin.template:
    src: 'copyparty.conf.j2'
    dest: '{{ copyparty___app._cfg }}'
    owner: '{{ copyparty__cfg._uid }}'
    group: '{{ copyparty__cfg._gid }}'
    mode: '0640'

- name: '{{ "Install | systemd | create " ~ copyparty___app._service }}'
  ansible.builtin.template:
    src: 'systemd/copyparty.service.j2'
    dest: '{{ copyparty___app._service }}'
    owner: 'root'
    group: 'root'
    mode: '0644'
