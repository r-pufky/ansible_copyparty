---
###############################################################################
# Start
###############################################################################
# Start copyparty services and confirm they are active and running.

- name: 'Start | copyparty.service'
  ansible.builtin.systemd:
    name: 'copyparty.service'
    enabled: true
    daemon_reload: true
    state: 'started'
  delay: 15
  retries: 3
  register: copyparty__service
  until: copyparty__service.status.ActiveState == 'active'

- name: 'Start | query service status'
  ansible.builtin.service_facts:

- name: 'Start | assert | services running'
  ansible.builtin.assert:
    quiet: true
    that: ansible_facts.services[item].state == 'running'
    fail_msg: |

      ✘ Service failed to start.
      {{ item }}
  loop:
    - 'copyparty.service'
