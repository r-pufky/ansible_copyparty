---
###############################################################################
# copyparty Role Options
###############################################################################
# Default required packages for copyparty install.
#
# Updates:
# * Branch for new Debian releases.
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update defaults.
# * Update tests for any changes.
# * Standard validation testing (yamllint, ansible-lint, to-do, no-qa).
#
# Reference:
# * https://github.com/9001/copyparty/releases

copyparty___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-14',
    _debian='trixie',
    _app='v1.20.12',
  ) }}"

###############################################################################
# APT Packages
###############################################################################

copyparty___packages:
  - 'python3-pil'
  - 'ffmpeg'
  - 'libvips42t64'  # Higher quality thumbnails than pillow.
  - 'python3-mutagen'  # Pure python music tags.

###############################################################################
# copyparty GitHub Options
###############################################################################
# Reference:
# * https://github.com/copyparty/copyparty/releases/latest

copyparty___repo_url:
  'https://github.com/9001/copyparty/releases/download/'
copyparty___package: 'copyparty-sfx.py'

copyparty___app: "{{ {} | r_pufky.data.v3(

    _version=copyparty___release._app,
    _package=copyparty___package,
    _base_url=copyparty___repo_url,
    _etc_dir='/etc/opt/copyparty',
    _cfg='/etc/opt/copyparty/copyparty.conf',
    _opt_dir='/opt/copyparty',
    _src_dir='/opt/copyparty/src',
    _var_dir='/var/opt/copyparty',
    _service='/etc/systemd/system/copyparty.service',
    _url=(
      copyparty___repo_url ~ '/' ~ copyparty___release._app ~ '/' ~
      copyparty___package
    ),
  ) }}"

###############################################################################
# Default User/Group
###############################################################################

copyparty___group:
  name: 'copyparty'
  gid: 696

copyparty___user:
  name: 'copyparty'
  group: 'copyparty'
  uid: 696
  shell: '/usr/sbin/nologin'
  home: '/var/lib/copyparty'
  comment: 'copyparty daemon,,,'
  create_home: false
  password: '!'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true
